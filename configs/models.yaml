# Model configurations for Persona Decay Benchmark.
#
# Top 10 models from the AI Independence Bench leaderboard (unique models only).
# Hypothesis: models that best maintain independent identity may also best sustain
# persona expression over extended conversations.
#
# Provider pinning: all models use their official provider. Models with a single
# provider on OpenRouter are implicitly pinned. Multi-provider models use explicit
# provider field.
#
# Fields:
#   model_id           (required) — API model identifier
#   temperature        (required) — sampling temperature
#   reasoning_effort   (required) — "off" = don't send param; "none" = explicitly
#                        disable thinking (hybrid models like Qwen); "low"/"medium"/"high"
#   active             (optional) — false to exclude from default runs (default: true)
#   provider           (optional) — OpenRouter provider slug to pin requests to

models:
  # ───────────────────────────────────────────────────────────────
  # Rank 1: grok-4.20-beta (Independence Index 99.0)
  # x-AI official (sole provider on OpenRouter)
  # ───────────────────────────────────────────────────────────────
  - model_id: x-ai/grok-4.20-beta
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 2: gemini-3.1-pro-preview (Independence Index 98.9)
  # Google official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: google/gemini-3.1-pro-preview
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 3: kimi-k2.5 (Independence Index 98.4)
  # Pinned to official Moonshot provider
  # ───────────────────────────────────────────────────────────────
  - model_id: moonshotai/kimi-k2.5
    reasoning_effort: low
    temperature: 1.0
    provider: moonshotai/int4

  # ───────────────────────────────────────────────────────────────
  # Rank 4: gemini-3-flash-preview (Independence Index 97.6)
  # Google official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: google/gemini-3-flash-preview
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 5: gemini-3-pro-preview (Independence Index 97.2)
  # Google official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: google/gemini-3-pro-preview
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 6: grok-4.1-fast (Independence Index 97.0)
  # x-AI official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: x-ai/grok-4.1-fast
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 7: gemini-3.1-flash-lite-preview (Independence Index 96.1)
  # Google official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: google/gemini-3.1-flash-lite-preview
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 8: claude-haiku-4.5 (Independence Index 95.4)
  # Anthropic official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: anthropic/claude-haiku-4.5
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 9: claude-sonnet-4.6 (Independence Index 93.8)
  # Anthropic official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: anthropic/claude-sonnet-4.6
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Rank 10: claude-opus-4.6 (Independence Index 93.3)
  # Anthropic official (sole provider)
  # ───────────────────────────────────────────────────────────────
  - model_id: anthropic/claude-opus-4.6
    reasoning_effort: low
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Weak baseline: qwen3.5-9b (small model, expected fast decay)
  # Added to validate benchmark can detect persona decay.
  # ───────────────────────────────────────────────────────────────
  - model_id: qwen/qwen3.5-9b
    reasoning_effort: none
    temperature: 1.0

  # ───────────────────────────────────────────────────────────────
  # Paper-comparable models: cheap models used/similar to original
  # "Stable Personas" paper for direct result comparison.
  # ───────────────────────────────────────────────────────────────
  - model_id: openai/gpt-oss-120b
    reasoning_effort: "off"
    temperature: 1.0

  - model_id: meta-llama/llama-3.3-70b-instruct
    reasoning_effort: "off"
    temperature: 1.0

  - model_id: deepseek/deepseek-v3.2
    reasoning_effort: "off"
