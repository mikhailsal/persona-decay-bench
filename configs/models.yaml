# ───────────────────────────────────────────────────────────────
# Infrastructure models (not benchmarked — used as tools)
# ───────────────────────────────────────────────────────────────
# Neutral conversation partner: x-ai/grok-4.1-fast
#   Switched from gemini-flash-lite in Run 3. Gemini's minimum cache
#   threshold (4096 tokens) caused 0% partner cache hits, wasting money.
#   Grok-4.1-fast has no such threshold and caches effectively.
#
# Observer evaluator: google/gemini-3-flash-preview (1 call)
#   Same judge model used in the Independence Bench. Cheap, fast,
#   reliable for structured rating tasks. Reduced from 3 to 1 call
#   after Run 1 showed observer SD of just 1.24 on a 36-point scale.
