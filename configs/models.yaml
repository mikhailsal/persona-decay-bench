# ───────────────────────────────────────────────────────────────
# Infrastructure models (not benchmarked — used as tools)
# ───────────────────────────────────────────────────────────────
# Neutral conversation partner: google/gemini-3.1-flash-lite-preview
#   Very cheap, good instruction following. Generates follow-up
#   questions to keep the conversation flowing naturally.
#
# Observer evaluator: google/gemini-3-flash-preview (×3 calls)
#   Same judge model used in the Independence Bench. Cheap, fast,
#   reliable for structured rating tasks. Called 3 times independently
#   per checkpoint for inter-rater reliability.
